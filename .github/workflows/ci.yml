name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14, windows-2022]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Audit dependencies (SPEC-840 supply chain gate)
        # Non-blocking for now — log advisories but don't fail CI on pre-existing ones.
        # HIGH/CRITICAL in ink, @inkjs/ui, react, marked, yoga-wasm-web, react-reconciler
        # should be investigated and addressed promptly.
        run: bun audit --prod || true

      - name: Type check
        run: bun run typecheck

      - name: Run unit tests (excluding HTTP channel)
        shell: bash
        run: |
          FILES=$(find tests -type f -name "*.test.ts" ! -path "tests/channels/http/*" | tr '\n' ' ')
          bun test --timeout 30000 $FILES

      - name: Run HTTP channel tests (isolated process — workaround bun#26394)
        run: bun test tests/channels/http/

      - name: Validate specs
        if: matrix.os == 'ubuntu-22.04'
        run: bun run spec validate
